name: Atualizar dashboard de encerrados

on:
  # Roda 1x por dia às 06:00 BRT (09:00 UTC)
  schedule:
    - cron: '0 9 * * *'
  # Permite rodar manualmente pelo botão "Run workflow" na aba Actions
  workflow_dispatch:

jobs:
  atualizar-dados:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rodar busca de dados no Odoo
        env:
          ODOO_URL:      ${{ secrets.ODOO_URL }}
          ODOO_DB:       ${{ secrets.ODOO_DB }}
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
        run: python buscar_dados_encerrados.py

      - name: Commit do JSON atualizado
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add dados_encerrados.json
          git diff --staged --quiet || git commit -m "atualiza dados_encerrados.json [auto]"
          git push
